name: Monorepo CI/CD Automation

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/ci.cd.yml"
      - "sonar-project.properties"

  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "src/**"
      - ".github/workflows/ci.cd.yml"
      - "sonar-project.properties"

permissions:
  contents: write

jobs:
  test_matrix:
    name: Test Backend on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.x
          - 20.x
          - 22.x

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: src/backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

  sonarqube_analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  simulate_deployment:
    name: Simulate Secure Deployment
    runs-on: ubuntu-latest
    needs:
      - test_matrix
      - sonarqube_analysis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Simulate deployment preparation
        run: |
          echo "Starting deployment simulation..."
          echo "Validating environment..."
          echo "Checking build artifacts..."
          echo "Simulating secure deployment to production..."
          echo "Deployment simulation completed successfully."

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - simulate_deployment

    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
